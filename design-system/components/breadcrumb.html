<!-- BREADCRUMB — navegacion contextual + JSON-LD BreadcrumbList -->
<!-- Placeholders: {{ITEMS}} = array de {url, label, isLast?: true} -->
<nav class="breadcrumb container" aria-label="Ruta de navegacion">
  <ol class="breadcrumb__list" itemscope itemtype="https://schema.org/BreadcrumbList">
    <li class="breadcrumb__item" itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
      <a href="/" itemprop="item"><span itemprop="name">Inicio</span></a>
      <meta itemprop="position" content="1">
    </li>
    <li class="breadcrumb__item" itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
      <a href="/recursos/" itemprop="item"><span itemprop="name">Recursos</span></a>
      <meta itemprop="position" content="2">
    </li>
    <!-- repeat per ancestor -->
    <li class="breadcrumb__item" itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
      <span class="breadcrumb__current" itemprop="name">{{CURRENT_PAGE_TITLE}}</span>
      <meta itemprop="position" content="{{POSITION}}">
    </li>
  </ol>
</nav>
